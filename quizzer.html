<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzer</title>
    <link rel="icon" href="Spanish Quizzer logo.png" type="image/png">
    <style>
        body {
            text-align: center;
            font-family: Verdana, Roboto, Arial, Calibri, Georgia, sans-serif;
        }
        #quiz-box {
            width: 90%;
            height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #e5e5e5;
            border-radius: 5%;
        }
        #content {
            display: none;
        }
        #quiz-title {
            text-align: center;
            font-size: 2em;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .answer-explanation {
            text-align: center;
            display: none;
        }
        #question {
            text-align: center;
            font-size: 1.5em;
            margin-top: 50px;
            margin-bottom: 20px;
        }
        .answer-form {
            text-align: center;
            font-size: 2em;
            margin-top: 5px;
            width: 50%
        }
        #next-question{
            display: none;
            font-size: 2em;
        }
        #manual-grading {
            display: none;
            font-size: 2em;
            margin-top: 20px;
        }
        .topic-selection {
            font-size: 2em;
        }
        .chapter-selection {
            font-size: 2em;
        }
        .course-selection {
            font-size: 2em;
        }
        #topic-selection-form, #chapter-selection-form {
            display: none;
        }
        #streak {
            position: absolute;
            text-align: left;
            margin-left: 10px;
            margin-top: 15px;
            z-index: 5;
        }
        #flaming-icon {
            position: absolute;
            top: 0px;
            left: 47px;
            z-index: 0;
            display: none;
        }
        #streak-num {
            color: black;
            font-weight: bold;
            color: rgb(0, 0, 0);
        }
        #button-bar {
            text-align: center;
        }
        #special-characters-sign {
            font-size: 0.75em;
        }
        .char, #shift {
            font-size: 1.5em;
        }
        #link-to-home {
            position: absolute;
            left: 10px;
            top: 10px;
            z-index: 5;
        }
        #confetti {
            display: none;
        }
        button {
            font-family: Arial, Helvetica, sans-serif;
            border-radius: 4px;
            box-sizing: border-box;
            padding: 5px 10px;
            border: 2px solid black;
            background-color: rgb(235, 235, 235);
        }
        button:hover {
            background-color: rgb(191, 191, 191);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a id="link-to-home" href="index.html"><img src="Spanish Quizzer logo.png" width="50px" alt="Spanish quizzer logo"></a>
    <div id="quiz-box" data-current-question="" data-question-array="">
        <div id="content">
        <p id="streak">Streak:  <span id="streak-num">0</span></p>
        <img id="flaming-icon" src="flaming-streak-icon.png" alt="Flaming streak icon" width="70px">
        <h1 id="quiz-title">Quiz Mode</h1>
        <h1 id="question"></h1>
        <div id="button-bar">
            <h2 id="special-characters-sign">Special characters:</h2>
            <button id="shift">shift</button>
            <button class="shift char">á</button>
            <button class="shift char">é</button>
            <button class="shift char">í</button>
            <button class="shift char">ó</button>
            <button class="shift char">ú</button>
            <button class="shift char">ü</button>
            <button class="shift char">ñ</button>
            <button class="char">¡</button>
            <button class="char">¿</button>
        </div>
        <img id="confetti" alt="Confetti falling" src="confetti.gif">
        <form id="form">
            <label for="answer" class="answer-form" id="label">Your Answer:</label><br>
            <input type="text" class="answer-form" name="answer">
            <button type="submit" class="answer-form">Submit</button>
        </form>
        <h1 id="result" class="answer-explanation">You got this wrong.</h1>
        <h2 class="answer-explanation user-answer">You answered:</h2>
        <h3 class="answer-explanation user-answer" id="user-answer">Answer</h3>
        <h2 class="answer-explanation correct-answer" id="correct-answer-sign">Correct Answer:</h2>
        <h3 class="answer-explanation correct-answer" id="correct-answer">Real Answer</h3>
        <button type="submit" id="next-question">Next Question</button>
        <br>
        <button type="submit" id="manual-grading"></button>
        </div>
        <div id="selection">
            <form id="course-selection-form">
                <fieldset id="course-disable">
                <label for="course-selection" class="course-selection">Select the course:</label>
                <br>
                <select name="course" id="course-selection" class="course-selection" required>
                    <option value="" disabled selected hidden>Please select an option</option>
                </select>
                <br>
                <button type="submit" class="course-selection">Select</button>
                </fieldset>
            </form>
            <form id="chapter-selection-form">
                <fieldset id="chapter-disable">
                <label for="chapter-selection" class="chapter-selection">Select the chapter:</label>
                <br>
                <select name="chapter" id="chapter-selection" class="chapter-selection" required>
                    <option value="" disabled selected hidden>Please select an option</option>
                </select>
                <br>
                <button type="submit" class="chapter-selection">Select</button>
                </fieldset>
            </form>
            <form id="topic-selection-form">
                <fieldset id="topic-disable">
                <label for="topic-selection" class="topic-selection">Select the topic:</label>
                <br>
                <select name="topic" id="topic-selection" class="topic-selection" required>
                    <option value="" disabled selected hidden>Please select an option</option>
                </select>
                <br>
                <button type="submit" class="topic-selection">Submit</button>
                </fieldset>
            </form>
    </div>

    const shuffleArray = function (array){
        let shuffled = array
        let j;
        for (let i = shuffled.length - 1; i > 0; i--) {
            j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]
        }
        return shuffled
    }
    const insertChar = function (char, deletePrevious=false) {
        const domEl = $('[name="answer"]')[0]
        if ($(domEl).css("display") === "none") {
            return 0; //If the domEl is hidden why add something to it?
        }
        const startPos = domEl.selectionStart
        const endPos = domEl.selectionEnd
        const currentVal = $(domEl).val()
        const newVal = currentVal.slice(0, deletePrevious ? startPos - 1 : startPos) + char + currentVal.slice(endPos)
        $(domEl).val(newVal)
        if (deletePrevious) {
            domEl.setSelectionRange(startPos, startPos)
        } else {
            domEl.setSelectionRange(startPos + 1, startPos + 1)
        }
        $(domEl).focus()
    }
    const keyboardShortcut = function (event) {

            if ((keys.includes(keyPressed) || (keyPressed === "Digit1" && event.shiftKey) || (keyPressed === "Slash" && event.shiftKey)) && event.altKey){
                event.preventDefault()
                const shifted = Boolean(event.originalEvent.getModifierState("CapsLock") ^ event.shiftKey) // ^ is bitwise exclusive or operator. Since it returns 0 or 1, you have to use Boolean() on it.

    const shiftAll = function () {

            })

            //Scenario where we need to lowercase everything.
            shift = "lowercase"

            })
        }

    const manualGrading = function (event) {
        let questionArray = getQuestionArray()
        let question = getCurrentQuestion()
        if (event.data.ogResult) { //Event.data is boolean
            //If it is true then that means that we need to mark it wrong.
            if (!questionArray.includes(question)) {
                questionArray.push(question)
            }
            questionRep[question] = questionRep[question] + 3 //To account for the one that checkAnswer just subtracted.
            streak = 0
            refreshStreak(streak)
        } else {
            //We need to mark it correct instead.
            questionRep[question] = questionRep[question] - 3
            if (questionRep[question] <= 0) {
                questionArray.pop() //remove the question
            }
            streak = oldStreak + 1
            refreshStreak(streak)
        }
        changeQuestionArray(questionArray)
        console.log(questionRep, getQuestionArray())
        $("#next-question").trigger("click")
    }
